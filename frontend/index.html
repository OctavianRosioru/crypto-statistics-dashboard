<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEW_STATISTIC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <div class="page-header">
      <h1>NEW_STATISTIC</h1>
      <a href="/admin.html" class="admin-btn" title="Login required">⚙ Admin</a>
    </div>

    <!-- FILTER PANEL -->
    <section class="filters-panel">

      <div class="filter-row">
        <label class="filter-label" for="symbolsInput">Symbol whitelist</label>
        <input type="text" id="symbolsInput" class="filter-input wide"
               placeholder="BTCUSDT, ETHUSDT, SOLUSDT …" />
        <label class="checkbox-label">
          <input type="checkbox" id="blacklistCheck" /> Blacklist mode
        </label>
      </div>

      <div class="filter-row">
        <label class="filter-label" for="distanceInput">Distance</label>
        <input type="number" id="distanceInput" class="filter-input narrow"
               value="2" min="0.1" step="0.1" />
        <span class="unit">%</span>
        <label class="radio-label">
          <input type="radio" name="direction" value="from" id="dirFrom" checked /> From
        </label>
        <label class="radio-label">
          <input type="radio" name="direction" value="upto" id="dirUpto" /> Up to
        </label>
      </div>

      <div class="filter-row">
        <label class="filter-label" for="stepInput">Step</label>
        <input type="number" id="stepInput" class="filter-input narrow"
               value="0.5" min="0.1" step="0.1" />
        <span class="unit">%</span>
      </div>

      <div class="filter-row">
        <label class="filter-label" for="horizonSelect">Horizon</label>
        <select id="horizonSelect" class="filter-select">
          <option value="1">1s</option>
          <option value="5" selected>5s</option>
          <option value="15">15s</option>
          <option value="30">30s</option>
          <option value="60">60s</option>
          <option value="300">300s</option>
        </select>
        <label class="checkbox-label"><input type="checkbox" id="showTpCheck" checked /> TP</label>
        <label class="checkbox-label"><input type="checkbox" id="showSlCheck" checked /> SL</label>
        <label class="checkbox-label"><input type="checkbox" id="showNoneCheck" /> None</label>
      </div>

      <div class="filter-row">
        <label class="filter-label" for="periodSelect">Period</label>
        <select id="periodSelect" class="filter-select">
          <option value="1">Last day</option>
          <option value="3">Last 3 days</option>
          <option value="7" selected>7 days</option>
          <option value="14">14 days</option>
          <option value="30">30 days</option>
          <option value="0">All time</option>
        </select>
      </div>

      <div class="filter-row">
        <label class="filter-label" for="minDensityInput">Min quote USDT</label>
        <input type="number" id="minDensityInput" class="filter-input narrow"
               value="0" min="0" step="1000" />
        <span class="unit">per candle</span>
      </div>

      <div class="filter-row">
        <label class="filter-label">Side</label>
        <label class="radio-label">
          <input type="radio" name="side" value="all" id="sideAll" checked /> All
        </label>
        <label class="radio-label">
          <input type="radio" name="side" value="Buy" id="sideBuy" /> Buy
        </label>
        <label class="radio-label">
          <input type="radio" name="side" value="Sell" id="sideSell" /> Sell
        </label>
      </div>

      <div class="filter-row">
        <label class="checkbox-label big">
          <input type="checkbox" id="activityModeCheck" />
          Market activity &mdash; sort by max diff% (no TP/SL)
        </label>
      </div>

      <button type="button" id="applyBtn" class="apply-btn">Apply</button>
    </section>

    <p id="status" class="status" aria-live="polite"></p>
    <div id="results"></div>
  </main>
  <script src="app.js" defer></script>
</body>
</html>
